name: Deploy to OCI VM

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/opc/deploy_tmp"

      - name: Execute post-publish script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Iniciando processo de deploy..."
            
            # Criar as pastas de destino, caso não existam
            sudo mkdir -p /usr/share/nginx/html
            sudo mkdir -p /opt/dizimo
            sudo chown opc:opc /opt/dizimo
            
            # 1️⃣ Mover apenas a pasta frontend para o servidor Nginx (Público)
            sudo cp -r /home/opc/deploy_tmp/frontend/* /usr/share/nginx/html/
            
            # 2️⃣ Mover o backend e o resto para o diretório seguro /opt/dizimo
            # Usando sudo para garantir permissão nos diretórios do sistema
            sudo rsync -av --exclude='frontend' /home/opc/deploy_tmp/ /opt/dizimo/
            sudo chown -R opc:opc /opt/dizimo
            
            # Limpar diretório temporário
            rm -rf /home/opc/deploy_tmp
            
            # Tentar reiniciar Nginx
            sudo systemctl restart nginx || echo "Falha ao reiniciar Nginx."
            
            # 3️⃣ Reiniciar o serviço Python do Backend
            sudo systemctl restart dizimo || echo "Falha ao reiniciar o serviço dizimo."
            
            echo "Deploy finalizado com segurança!"
