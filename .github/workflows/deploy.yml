name: Deploy to OCI VM

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/opc/deploy_tmp"

      - name: Execute post-publish script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Iniciando processo de deploy..."
            
            # Criar as pastas de destino, caso não existam
            sudo mkdir -p /var/www/html
            mkdir -p /home/opc/dizimo_app
            
            # 1️⃣ Mover apenas a pasta frontend para o servidor Nginx (Público)
            # Dessa forma, todos HTML/CSS ficam lá.
            sudo cp -r /home/opc/deploy_tmp/frontend/* /var/www/html/
            
            # 2️⃣ Mover o backend e o resto para o diretório seguro do aplicativo
            # Isso inclui as chaves OCI e o Python
            rsync -av --exclude='frontend' /home/opc/deploy_tmp/ /home/opc/dizimo_app/
            
            # Limpar diretório temporário
            rm -rf /home/opc/deploy_tmp
            
            # Tentar reiniciar Nginx
            sudo systemctl restart nginx || echo "Nginx não estava rodando."
            
            # Reiniciar o serviço Python do Backend (Comentado até criarmos o serviço no futuro)
            # sudo systemctl restart dizimo_backend
            
            echo "Deploy finalizado com segurança!"
