name: Deploy to OCI VM

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy files to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/opc/deploy_tmp"

      - name: Execute post-publish script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Deploy started..."
            # Mover arquivos temporários para o destino final (/var/www/html)
            sudo mkdir -p /var/www/html
            
            # ATENÇÃO: Copiaremos tudo para o diretório final. Se quiser separar o frontend da raiz, avise depois!
            sudo cp -r /home/opc/deploy_tmp/* /var/www/html/
            
            # Limpar tmp
            rm -rf /home/opc/deploy_tmp
            
            # Tentar reiniciar Nginx pra garantir se houver mudança de configuração
            sudo systemctl restart nginx || echo "Nginx restart failed ou não instalado."
            
            # Dica: Adicionaremos aqui o reinício do backend (Flask) se houver um serviço para ele.
            echo "Deploy concluído!"
